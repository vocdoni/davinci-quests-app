services:
  api:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "3001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.quests-api.rule=Host(`quests-api.davinci.ninja`)
      - traefik.http.routers.quests-api.entrypoints=websecure
      - traefik.http.routers.quests-api.tls=true
      - traefik.http.services.quests-api.loadbalancer.server.port=3001
    restart: unless-stopped
  
  traefik:
    profiles:
      - prod
    image: traefik:v3.3
    container_name: traefik
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/dynamic/tls.yml
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/certs:ro
    restart: unless-stopped

  mongo:
    profiles:
      - local
    image: mongo:8.0-noble
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 }).ok' | mongosh mongodb://127.0.0.1:27017/admin --quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
