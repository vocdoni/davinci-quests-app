services:
  api:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    expose:
      - "3001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.quests-api.rule=Host(`${TRAEFIK_API_DOMAIN:-quests-api.davinci.ninja}`)
      - traefik.http.routers.quests-api.entrypoints=websecure
      - traefik.http.routers.quests-api.tls=true
      - traefik.http.routers.quests-api.tls.certresolver=le
      - traefik.http.services.quests-api.loadbalancer.server.port=3001
    restart: unless-stopped
  
  traefik:
    profiles:
      - prod
    container_name: traefik
    image: traefik:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=root@vocdoni.io"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    restart: unless-stopped

  mongo:
    profiles:
      - local
    image: mongo:8.0-noble
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 }).ok' | mongosh mongodb://127.0.0.1:27017/admin --quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
