services:
  mongo:
    image: mongo:8.0-noble
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 }).ok' | mongosh mongodb://127.0.0.1:27017/admin --quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - path: .env.server
        required: false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
        VITE_TARGET_CHAIN_ID: ${VITE_TARGET_CHAIN_ID:-1}
        VITE_TARGET_CHAIN_NAME: ${VITE_TARGET_CHAIN_NAME:-Ethereum}
        VITE_TARGET_CHAIN_RPC_URL: ${VITE_TARGET_CHAIN_RPC_URL:-https://eth.llamarpc.com}
        VITE_TARGET_CHAIN_BLOCK_EXPLORER_URL: ${VITE_TARGET_CHAIN_BLOCK_EXPLORER_URL:-https://etherscan.io}
        VITE_TARGET_CHAIN_NATIVE_CURRENCY_NAME: ${VITE_TARGET_CHAIN_NATIVE_CURRENCY_NAME:-Ether}
        VITE_TARGET_CHAIN_NATIVE_CURRENCY_SYMBOL: ${VITE_TARGET_CHAIN_NATIVE_CURRENCY_SYMBOL:-ETH}
        VITE_TARGET_CHAIN_NATIVE_CURRENCY_DECIMALS: ${VITE_TARGET_CHAIN_NATIVE_CURRENCY_DECIMALS:-18}
        VITE_WALLETCONNECT_PROJECT_ID: ${VITE_WALLETCONNECT_PROJECT_ID:-your_walletconnect_project_id}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  mongo_data:
